<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Introduccion al drag and Drop</title>
</head>
<style type="text/css">#div1{width:70px; padding: 10px;border: 1px solid #aaaaaa;}</style>
<script>
    function allowDrop(ev)
    {
        ev.preventDefault();
    }
    function drag(ev)
    {
        ev.dataTransfer.setData("Text",ev.target.id);
    }
    function drop(ev)
    {
        ev.preventDefault();
        var data=ev.dataTransfer.getData("Text");
        ev.target.appendChild(document.getElementById(data));
    }
</script>
<body>
    <p>Arrastrar la imagen al rectangulo</p>
    <div id="div1" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
    <div id="drag1" src="img1.jpg" draggable="true" ondragstart="drag(event)" ></div>
</body>
</html>
