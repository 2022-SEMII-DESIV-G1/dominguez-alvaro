<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ejemplo de Bordes</title>
    <style>
        #border_radius{
            border: 2px solid;
            font-size: 14px;
            color: #ffffff;
            font-weight: bold;
            padding: 10px;
            background: #6AAFCF;
            border-radius: 25px;
        }
        #box_shadow{
            font-size: 14px;
            color: #ffffff;
            padding: 10px;
            background: #6AAFCF;
            box-shadow: 15px 15px 15px #888245;
        }
        #border_image{
           border-width: 15px;
           border-image: url(media/border.png)30 30 round; 
        }
    </style>
</head>
<body>
    <div id="border_radius">Con la ayuda de las propiedades de radio de borde,podemos hacer que los bordes de las esquinas redondeadas</div>

    <div id="box_shadow">Con la ayuda de las propiedades de box-shadow,podemos crear la sombra para un cuadro</div>
    
    <body>
        <div id="border_image">Puedes ver el borde personalizado.Esto podria ser en formato *.png o * .jpg.</div>
    </body>
</body>
</html>
